<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Ashwini Card Stock Catalog</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f8; color: #333; padding: 20px; }
        
        header { text-align: center; margin-bottom: 25px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        header h1 { color: #8b0000; margin-bottom: 5px; }
        header p { color: #666; font-size: 14px; }

        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: none; background: #eee; cursor: pointer; border-radius: 20px; font-weight: bold; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: #8b0000; color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        
        .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        .card-details { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #222; }
        .card-code { color: #777; font-size: 12px; margin-bottom: 10px; }
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .price { color: #b80000; font-weight: bold; font-size: 16px; }
        
        .stock-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .in-stock { background: #e6f4ea; color: #137333; }
        .low-stock { background: #fef7e0; color: #b06000; }
        .out-stock { background: #fce8e6; color: #c5221f; }

        .btn-order { margin-top: auto; padding: 10px; background: #25D366; color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; }
        .btn-order:hover { background: #1eb855; }
    </style>
</head>
<body>

    <header>
        <h1>Sri Ashwini Card</h1>
        <p>Hamara Live Wedding Cards Stock aur Rates</p>
    </header>

    <!-- Category Filters -->
    <div class="filters">
        <button class="filter-btn active" onclick="filterCards('all')">Sabhi Cards</button>
        <button class="filter-btn" onclick="filterCards('Premium')">Premium Cards</button>
        <button class="filter-btn" onclick="filterCards('Budget')">Budget Cards</button>
    </div>

    <!-- Cards Grid -->
    <div class="grid" id="cardContainer">
    </div>

    <script>
        // AAPKO SIRF YAHAN APNA PHONE NUMBER AUR STOCK DATA CHANGE KARNA HAI
        const whatsappNumber = "919876543210"; // Apne WhatsApp number se replace karo

        const cardsData = [
            {
                id: "CARD-101",
                name: "Red Velvet Gold Foil Card",
                category: "Premium",
                price: "₹45 / Pcs",
                stock: 450,
                image: "https://via.placeholder.com/300x200?text=Card+101"
            },
            {
                id: "CARD-102",
                name: "Simple Floral Envelope Card",
                category: "Budget",
                price: "₹18 / Pcs",
                stock: 1200,
                image: "https://via.placeholder.com/300x200?text=Card+102"
            },
            {
                id: "CARD-103",
                name: "Royal Box Style Invitation",
                category: "Premium",
                price: "₹120 / Pcs",
                stock: 35,
                image: "https://via.placeholder.com/300x200?text=Card+103"
            },
            {
                id: "CARD-104",
                name: "Ganesha Motif Cream Card",
                category: "Budget",
                price: "₹25 / Pcs",
                stock: 0,
                image: "https://via.placeholder.com/300x200?text=Card+104"
            }
        ];

        function renderCards(filter = 'all') {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            cardsData.forEach(card => {
                if (filter !== 'all' && card.category !== filter) return;

                let stockClass = 'in-stock';
                let stockText = `${card.stock} Pcs Available`;
                
                if (card.stock === 0) {
                    stockClass = 'out-stock';
                    stockText = 'Out of Stock';
                } else if (card.stock < 100) {
                    stockClass = 'low-stock';
                    stockText = `Only ${card.stock} left!`;
                }

                const waMessage = encodeURIComponent(`Hello, mujhe is card ki inquiry karni hai:\nCode: ${card.id}\nName: ${card.name}\nRate: ${card.price}`);
                const waLink = `https://wa.me/${whatsappNumber}?text=${waMessage}`;

                const cardHTML = `
                    <div class="card">
                        <img src="${card.image}" alt="${card.name}">
                        <div class="card-details">
                            <div class="card-title">${card.name}</div>
                            <div class="card-code">Code: ${card.id}</div>
                            
                            <div class="info-row">
                                <span>Rate:</span>
                                <span class="price">${card.price}</span>
                            </div>
                            
                            <div class="info-row">
                                <span>Stock:</span>
                                <span class="stock-badge ${stockClass}">${stockText}</span>
                            </div>

                            <a href="${waLink}" target="_blank" class="btn-order" style="${card.stock === 0 ? 'pointer-events:none; opacity:0.6;' : ''}">
                                WhatsApp Order
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function filterCards(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCards(category);
        }

        renderCards();
    </script>
</body>
</html>
